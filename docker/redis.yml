services:
  redis:
    image: redis:8.0.6 # Pulls the most recent stable version
    container_name: redis-server
    ports:
      - '6379:6379' # Map host port 6379 to container port 6379
    volumes:
      - redis_data:/data # Persist data even if container is removed
    command: redis-server --requirepass password --save 60 1
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
