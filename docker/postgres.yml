services:
  postgres:
    image: postgres:18
    container_name: pikslots_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pikslots
    ports:
      - '5432:5432'
    volumes:
      - pikslots_postgres_data:/var/lib/postgresql/data

volumes:
  pikslots_postgres_data:
