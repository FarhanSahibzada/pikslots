services:
  postgres:
    image: postgres:18
    container_name: pikslots_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pikslots_postgres_data:/var/lib/postgresql

volumes:
  pikslots_postgres_data:
